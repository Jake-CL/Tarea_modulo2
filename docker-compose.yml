
services:


  api:
    build: 
      context: ./api
      dockerfile: Dockerfile
    volumes:
      - ./api:/usr/src/app
    container_name: api-node-tarea
    restart: on-failure
    environment:
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pokedex_final
      DB_HOST: postgres
      DB_PORT: 5432
    env_file:
      - ./api/.env
    ports:
       - '3000:3000'
    depends_on:
      - postgres

  postgres:
    image: postgres:17
    container_name: tarea-final-pokedex
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pokedex_final
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data     

volumes:
  postgres-data: